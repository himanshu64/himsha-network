<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="HIM Network">
  <defs>
    <linearGradient id="himGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7931A"/>
      <stop offset="1" stop-color="#FFB347"/>
    </linearGradient>
  </defs>
  <!-- chip / block -->
  <rect width="32" height="32" rx="7" fill="url(#himGrad)"/>
  <!-- H legs -->
  <rect x="8.4"  y="8" width="3.3" height="16" rx="1.3" fill="#0a0a0b"/>
  <rect x="20.3" y="8" width="3.3" height="16" rx="1.3" fill="#0a0a0b"/>
  <!-- doubled crossbar: evokes "hash" (#) / stacked Bitcoin blocks -->
  <rect x="8.4" y="13.2" width="15.2" height="2.5" rx="1" fill="#0a0a0b"/>
  <rect x="8.4" y="17.1" width="15.2" height="2.5" rx="1" fill="#0a0a0b"/>
</svg>
